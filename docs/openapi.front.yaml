  /api/front/languages:
    get:
      tags: [Languages]
      summary: 获取前台可用语言列表（含绑定币种）
      description: |
        返回所有 `status=active` 的站点语言，供前台语言切换器使用。
        每项包含 `currencyCode`，表示该语言下的默认展示币种；调用商品、购物车等接口时通过 `x-vex-locale` 传入 `code`，服务端按语言-币种映射返回对应价格。
      responses:
        '200':
          description: 语言列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorefrontLanguagesResponse'
              example:
                languages:
                  - code: en
                    name: English
                    nativeName: English
                    region: Global
                    direction: ltr
                    countryCodes: [US, GB]
                    currencyCode: USD
                    isDefault: true
                    sortOrder: 0
                  - code: de
                    name: German
                    nativeName: Deutsch
                    region: Europe
                    direction: ltr
                    countryCodes: [DE, AT, CH]
                    currencyCode: EUR
                    isDefault: false
                    sortOrder: 10
  /api/front/inquiries:
    post:
      tags: [Inquiries]
      summary: 提交询价
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInquiryRequest'
      responses:
        '201':
          description: 询价提交成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Inquiry'
    get:
      tags: [Inquiries]
      summary: 获取当前用户询价记录
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 询价列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Inquiry'
  /api/front/inquiries/{inquiryId}:
    get:
      tags: [Inquiries]
      summary: 获取询价详情
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/InquiryIdParam'
      responses:
        '200':
          description: 询价详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Inquiry'
  /api/front/wishlist:
    get:
      tags: [Wishlist]
      summary: 获取收藏列表（favorites）
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/LocaleQueryParam'
      responses:
        '200':
          description: 收藏列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WishlistResponse'
    post:
      tags: [Wishlist]
      summary: 添加商品到收藏
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/LocaleQueryParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
                  format: uuid
              required: [productId]
