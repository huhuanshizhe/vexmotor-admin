openapi: 3.1.0
info:
  title: Lianchuan Storefront API
  version: 0.1.0
  summary: 前台电商网站接口契约
  description: |
    本文档定义前台商城所需的 REST API 契约，覆盖首页、分类、搜索、商品详情、购物车、结账、地址、订单、认证、会员资料、询价、收藏等能力。
    该文档是前台与服务端联调的唯一接口真源。
servers:
  - url: http://localhost:5100
    description: Local admin API (vexmotor-admin)
  - url: https://example.com
    description: Production placeholder
tags:
  - name: Home
  - name: Navigation
  - name: Categories
  - name: Search
  - name: Products
  - name: Cart
  - name: Checkout
  - name: Orders
  - name: Addresses
  - name: Auth
  - name: Profile
  - name: Inquiries
  - name: Wishlist
  - name: Languages
  - name: Compare
  - name: Brands
  - name: Content
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Front-office JWT from /api/front/auth/login or OAuth callback
  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeParam:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    SearchKeywordParam:
      name: keyword
      in: query
      schema:
        type: string
        minLength: 1
    CategorySlugParam:
      name: slug
      in: path
      required: true
      schema:
        type: string
    ProductSlugParam:
      name: slug
      in: path
      required: true
      schema:
        type: string
    CartItemIdParam:
      name: itemId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OrderNumberParam:
      name: orderNumber
      in: path
      required: true
      schema:
        type: string
    InquiryIdParam:
      name: inquiryId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    LocaleHeader:
      name: x-vex-locale
      in: header
      description: 前台语言代码；与 site_languages 绑定，同时决定价格币种
      schema:
        type: string
        example: en
    LocaleQueryParam:
      name: locale
      in: query
      description: 可选语言覆盖（优先级低于 x-vex-locale）
      schema:
        type: string
        example: en
    AddressTypeQueryParam:
      name: type
      in: query
      description: 按地址类型筛选
      schema:
        type: string
        enum: [shipping, billing]
    ProductIdParam:
      name: productId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BoardKeyParam:
      name: boardKey
      in: path
      required: true
      schema:
        type: string
        description: 看板 key（如 faq、tech-faq、blog 类看板）
  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type:
            - array
            - 'null'
          items:
            type: object
            additionalProperties: true
      required: [code, message]
      additionalProperties: false
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
      required: [page, pageSize, total, totalPages]
      additionalProperties: false
    Money:
      type: object
      properties:
        currency:
          type: string
          example: USD
        amount:
          type: number
        formatted:
          type: string
      required: [currency, amount, formatted]
      additionalProperties: false
    ImageAsset:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        alt:
          type: string
        width:
          type: integer
        height:
          type: integer
      required: [id, url, alt]
      additionalProperties: false
    Brand:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        logo:
          $ref: '#/components/schemas/ImageAsset'
      required: [id, name, slug]
      additionalProperties: false
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        image:
          $ref: '#/components/schemas/ImageAsset'
        parentId:
          type:
            - string
            - 'null'
          format: uuid
      required: [id, name, slug]
      additionalProperties: false
    ProductCard:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        spu:
          type: string
        shortDescription:
          type: string
        coverImage:
          $ref: '#/components/schemas/ImageAsset'
        price:
          $ref: '#/components/schemas/Money'
        compareAtPrice:
          oneOf:
            - $ref: '#/components/schemas/Money'
            - type: 'null'
        purchaseMode:
          type: string
          enum: [buy, inquiry]
        inStock:
          type: boolean
        brand:
          oneOf:
            - $ref: '#/components/schemas/Brand'
            - type: 'null'
      required: [id, name, slug, spu, purchaseMode, inStock]
      additionalProperties: false
    ProductVariantOption:
      type: object
      properties:
        group:
          type: string
        value:
          type: string
      required: [group, value]
      additionalProperties: false
    Attachment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        url:
          type: string
          format: uri
        mimeType:
          type: string
      required: [id, name, url]
      additionalProperties: false
    ProductDetail:
      allOf:
        - $ref: '#/components/schemas/ProductCard'
        - type: object
          properties:
            description:
              type: string
            gallery:
              type: array
              items:
                $ref: '#/components/schemas/ImageAsset'
            categories:
              type: array
              items:
                $ref: '#/components/schemas/Category'
            attributes:
              type: array
              items:
                $ref: '#/components/schemas/ProductVariantOption'
            attachments:
              type: array
              items:
                $ref: '#/components/schemas/Attachment'
            relatedProducts:
              type: array
              items:
                $ref: '#/components/schemas/ProductCard'
            stockQuantity:
              type: integer
            seoTitle:
              type: string
            seoDescription:
              type: string
            configurableFeatures:
              type: array
              items:
                type: object
                additionalProperties: true
            features:
              type: array
              items:
                type: object
                additionalProperties: true
            manufacturing:
              type: object
              additionalProperties: true
            seo:
              type: object
              additionalProperties: true
            paidSampleEnabled:
              type: boolean
            allowBackorder:
              type: boolean
          required: [description, gallery, categories, attributes, attachments, relatedProducts]
          additionalProperties: true
    BrandListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        logo:
          type:
            - object
            - 'null'
          properties:
            url:
              type: string
            alt:
              type: string
        websiteUrl:
          type:
            - string
            - 'null'
      required: [id, name, slug]
      additionalProperties: false
    FaqListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        body:
          type: string
          description: FAQ 正文 HTML
      required: [id, title, body]
      additionalProperties: false
    FaqListResponse:
      type: object
      properties:
        locale:
          type: string
        boardKey:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/FaqListItem'
      required: [locale, boardKey, items]
      additionalProperties: false
    BlogListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        summary:
          type:
            - string
            - 'null'
        slug:
          type: string
        category:
          type:
            - string
            - 'null'
        coverStyle:
          type:
            - integer
            - 'null'
          minimum: 1
          maximum: 10
        publishedAt:
          type:
            - string
            - 'null'
          format: date-time
      required: [id, title, summary, slug, category, coverStyle, publishedAt]
      additionalProperties: false
    BlogListResponse:
      type: object
      properties:
        locale:
          type: string
        boardKey:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/BlogListItem'
      required: [locale, boardKey, items]
      additionalProperties: false
    BlogDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        summary:
          type:
            - string
            - 'null'
        body:
          type: string
          description: 博客正文 HTML
        slug:
          type: string
        category:
          type:
            - string
            - 'null'
        coverStyle:
          type:
            - integer
            - 'null'
          minimum: 1
          maximum: 10
        cover:
          type:
            - object
            - 'null'
          properties:
            url:
              type: string
            alt:
              type: string
          required: [url, alt]
        seo:
          type: object
          properties:
            title:
              type:
                - string
                - 'null'
            description:
              type:
                - string
                - 'null'
          required: [title, description]
        publishedAt:
          type:
            - string
            - 'null'
          format: date-time
        boardKeys:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        relatedProductSlugs:
          type: array
          items:
            type: string
        author:
          type: object
          properties:
            name:
              type:
                - string
                - 'null'
            title:
              type:
                - string
                - 'null'
            bio:
              type:
                - string
                - 'null'
          required: [name, title, bio]
      required: [id, title, summary, body, slug, category, coverStyle, cover, author, seo, publishedAt, boardKeys, tags, relatedProductSlugs]
      additionalProperties: false
    FeatureSelectionInput:
      type: object
      properties:
        valueId:
          type: string
          format: uuid
      required: [valueId]
      additionalProperties: false
    FeatureSelectionSnapshotItem:
      type: object
      properties:
        definitionId:
          type: string
          format: uuid
        definitionKey:
          type: string
        definitionName:
          type: string
        valueId:
          type: string
          format: uuid
        display:
          type: string
        unit:
          type:
            - string
            - 'null'
      required: [definitionId, definitionKey, definitionName, valueId, display]
      additionalProperties: false
    ProductListResponse:
      type: object
      properties:
        locale:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductCard'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
        facets:
          type: array
          items:
            type: object
            additionalProperties: true
      required: [locale, items, meta, facets]
      additionalProperties: false
    CartItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        product:
          $ref: '#/components/schemas/ProductCard'
        quantity:
          type: integer
          minimum: 1
        unitPrice:
          $ref: '#/components/schemas/Money'
        subtotal:
          $ref: '#/components/schemas/Money'
        variantLabel:
          type: string
        configurationLabel:
          type: string
        configurationKey:
          type: string
        featureSelections:
          type: array
          items:
            $ref: '#/components/schemas/FeatureSelectionSnapshotItem'
      required: [id, productId, product, quantity, unitPrice, subtotal]
      additionalProperties: false
    Cart:
      type: object
      properties:
        id:
          type: string
          format: uuid
        locale:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        itemCount:
          type: integer
        couponCode:
          type:
            - string
            - 'null'
        coupon:
          type:
            - object
            - 'null'
          properties:
            code:
              type: string
            description:
              type: string
            isApplied:
              type: boolean
            message:
              type:
                - string
                - 'null'
          required: [code, description, isApplied, message]
        subtotal:
          $ref: '#/components/schemas/Money'
        discount:
          $ref: '#/components/schemas/Money'
        shipping:
          $ref: '#/components/schemas/Money'
        tax:
          $ref: '#/components/schemas/Money'
        total:
          $ref: '#/components/schemas/Money'
        freeShippingThreshold:
          $ref: '#/components/schemas/Money'
        remainingForFreeShipping:
          $ref: '#/components/schemas/Money'
      required: [id, items, itemCount, subtotal, discount, shipping, tax, total, freeShippingThreshold, remainingForFreeShipping]
      additionalProperties: false
    Address:
      type: object
      properties:
        id:
          type: string
          format: uuid
        addressType:
          type: string
          enum: [shipping, billing]
        firstName:
          type: string
        lastName:
          type: string
        company:
          type: string
        phone:
          type: string
        countryCode:
          type: string
        state:
          type: string
        city:
          type: string
        addressLine1:
          type: string
        addressLine2:
          type: string
        postalCode:
          type: string
        isDefault:
          type: boolean
      required: [id, addressType, firstName, lastName, countryCode, city, addressLine1, postalCode, isDefault]
      additionalProperties: false
    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type:
            - string
            - 'null'
        jobTitle:
          type:
            - string
            - 'null'
        status:
          type: string
          enum: [active, disabled, pending]
        role:
          type: string
        emailVerifiedAt:
          type:
            - string
            - 'null'
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, email, firstName, lastName, status, role, createdAt, updatedAt]
      additionalProperties: false
    CompanyProfile:
      type: object
      properties:
        company:
          type:
            - string
            - 'null'
        industry:
          type:
            - string
            - 'null'
        companyCountryCode:
          type:
            - string
            - 'null'
        companyState:
          type:
            - string
            - 'null'
        companyCity:
          type:
            - string
            - 'null'
        companyAddressLine1:
          type:
            - string
            - 'null'
        companyAddressLine2:
          type:
            - string
            - 'null'
        companyPostalCode:
          type:
            - string
            - 'null'
        website:
          type:
            - string
            - 'null'
        taxId:
          type:
            - string
            - 'null'
        companySize:
          type:
            - string
            - 'null'
      additionalProperties: false
    SiteLanguage:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        nativeName:
          type: string
        currencyCode:
          type: string
        direction:
          type: string
          enum: [ltr, rtl]
        isDefault:
          type: boolean
        sortOrder:
          type: integer
      required: [code, name, nativeName, currencyCode, direction, isDefault, sortOrder]
      additionalProperties: false
    AuthTokenResponse:
      type: object
      properties:
        token:
          type: string
        user:
          type: object
          properties:
            id:
              type: string
              format: uuid
            email:
              type: string
              format: email
            firstName:
              type: string
            lastName:
              type: string
            company:
              type:
                - string
                - 'null'
            status:
              type: string
              enum: [active, disabled, pending]
          required: [id, email, firstName, lastName, status]
        redirectPath:
          type: string
        message:
          type: string
      required: [token, user]
      additionalProperties: false
    ChangePasswordRequest:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8
      required: [currentPassword, newPassword]
      additionalProperties: false
    OrderItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        productName:
          type: string
        spu:
          type: string
        quantity:
          type: integer
        unitPrice:
          $ref: '#/components/schemas/Money'
        subtotal:
          $ref: '#/components/schemas/Money'
      required: [id, productName, spu, quantity, unitPrice, subtotal]
      additionalProperties: false
    OrderSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderNumber:
          type: string
        status:
          type: string
        total:
          $ref: '#/components/schemas/Money'
        createdAt:
          type: string
          format: date-time
      required: [id, orderNumber, status, total, createdAt]
      additionalProperties: false
    OrderDetail:
      allOf:
        - $ref: '#/components/schemas/OrderSummary'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/OrderItem'
            shippingAddress:
              $ref: '#/components/schemas/Address'
            billingAddress:
              $ref: '#/components/schemas/Address'
          required: [items, shippingAddress, billingAddress]
          additionalProperties: false
    Inquiry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        productName:
          type: string
        email:
          type: string
          format: email
        fullName:
          type: string
        phone:
          type: string
        company:
          type: string
        country:
          type: string
        message:
          type: string
        status:
          type: string
          enum: [new, contacted, quoted, closed]
        createdAt:
          type: string
          format: date-time
      required: [id, productId, productName, email, fullName, message, status, createdAt]
      additionalProperties: false
    WishlistItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        spu:
          type: string
        shortDescription:
          type: string
        purchaseMode:
          type: string
        price:
          $ref: '#/components/schemas/Money'
        currencyCode:
          type: string
        stockQuantity:
          type: integer
        inStock:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, productId, name, slug, spu, price, createdAt]
      additionalProperties: false
    WishlistResponse:
      type: object
      properties:
        locale:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/WishlistItem'
      required: [locale, items]
      additionalProperties: false
    CompareProductSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        spu:
          type: string
        brand:
          type:
            - string
            - 'null'
        category:
          type:
            - string
            - 'null'
        price:
          $ref: '#/components/schemas/Money'
        stockQuantity:
          type: integer
        inStock:
          type: boolean
        purchaseMode:
          type: string
      required: [id, name, slug, spu, price, stockQuantity, inStock, purchaseMode]
      additionalProperties: false
    CompareMatrixRow:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        group:
          type: string
        values:
          type: array
          items:
            type: string
        isDifferent:
          type: boolean
      required: [key, label, group, values, isDifferent]
      additionalProperties: false
    CompareResult:
      type: object
      properties:
        locale:
          type: string
        products:
          type: array
          items:
            $ref: '#/components/schemas/CompareProductSummary'
        groups:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              rows:
                type: array
                items:
                  type: string
            required: [name, rows]
        matrix:
          type: array
          items:
            $ref: '#/components/schemas/CompareMatrixRow'
        summary:
          type: object
          properties:
            sharedFeatureKeys:
              type: array
              items:
                type: string
            uniqueByProduct:
              type: array
              items:
                type: object
                properties:
                  productId:
                    type: string
                    format: uuid
                  keys:
                    type: array
                    items:
                      type: string
                required: [productId, keys]
          required: [sharedFeatureKeys, uniqueByProduct]
      required: [locale, products, groups, matrix, summary]
      additionalProperties: false
    AuthLoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
      required: [email, password]
      additionalProperties: false
    AuthRegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        companyName:
          type: string
        country:
          type: string
        industry:
          type: string
        companySize:
          type: string
        website:
          type: string
        taxId:
          type: string
        termsAccepted:
          type: boolean
        privacyAccepted:
          type: boolean
        exportComplianceAccepted:
          type: boolean
        _quick:
          type: boolean
          description: 快速结账注册；走轻量注册流程
      required: [email, password, firstName, lastName]
      additionalProperties: false
    AddCartItemRequest:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
        featureSelections:
          type: array
          items:
            $ref: '#/components/schemas/FeatureSelectionInput'
      required: [productId, quantity]
      additionalProperties: false
    UpdateCartItemRequest:
      type: object
      properties:
        quantity:
          type: integer
          minimum: 1
      required: [quantity]
      additionalProperties: false
    UpdateCartCouponRequest:
      type: object
      properties:
        couponCode:
          type:
            - string
            - 'null'
      additionalProperties: false
    CreateOrderRequest:
      type: object
      properties:
        shippingAddressId:
          type: string
          format: uuid
        billingAddressId:
          type: string
          format: uuid
        shippingMethod:
          type: string
        paymentMethod:
          type: string
        customerNote:
          type: string
        purchaseOrderNumber:
          type: string
        taxId:
          type: string
        requestedShipDate:
          type: string
        tradeTerm:
          type: string
      required: [shippingAddressId, billingAddressId, shippingMethod, paymentMethod]
      additionalProperties: false
    CreateInquiryRequest:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        fullName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        company:
          type: string
        country:
          type: string
        message:
          type: string
      required: [productId, fullName, email, message]
      additionalProperties: false
paths:
  /api/front/home:
    get:
      tags: [Home]
      summary: 获取首页聚合数据
      responses:
        '200':
          description: 首页数据
          content:
            application/json:
              schema:
                type: object
                properties:
                  heroBanners:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  featuredCategories:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'
                  hotSale:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductCard'
                  newRelease:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductCard'
                  featuredIndustries:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  testimonials:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                required: [heroBanners, featuredCategories, hotSale, newRelease, featuredIndustries, testimonials]
  /api/front/navigation:
    get:
      tags: [Navigation]
      summary: 获取导航和页头公共数据
      responses:
        '200':
          description: 导航数据
  /api/front/categories:
    get:
      tags: [Categories]
      summary: 获取分类树或分类列表
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/LocaleQueryParam'
      responses:
        '200':
          description: 分类列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  locale:
                    type: string
                  categories:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'
                required: [locale, categories]
  /api/front/categories/{slug}/products:
    get:
      tags: [Categories]
      summary: 获取分类商品列表
      parameters:
        - $ref: '#/components/parameters/CategorySlugParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: 分类商品列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
        '404':
          description: 分类不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/front/search:
    get:
      tags: [Search]
      summary: 搜索商品
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/LocaleQueryParam'
        - $ref: '#/components/parameters/SearchKeywordParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: 搜索结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
        '400':
          description: 缺少关键词
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/front/brands:
    get:
      tags: [Brands]
      summary: 获取品牌列表
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/LocaleQueryParam'
      responses:
        '200':
          description: 品牌列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  locale:
                    type: string
                  brands:
                    type: array
                    items:
                      $ref: '#/components/schemas/BrandListItem'
                required: [locale, brands]
  /api/front/boards/{boardKey}/faqs:
    get:
      tags: [Content]
      summary: 按看板获取已发布 FAQ 列表
      parameters:
        - $ref: '#/components/parameters/BoardKeyParam'
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/LocaleQueryParam'
      responses:
        '200':
          description: FAQ 列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaqListResponse'
  /api/front/boards/{boardKey}/blogs:
    get:
      tags: [Content]
      summary: 按看板获取已发布博客列表
      parameters:
        - $ref: '#/components/parameters/BoardKeyParam'
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/LocaleQueryParam'
      responses:
        '200':
          description: 博客列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlogListResponse'
  /api/front/blog/{slug}:
    get:
      tags: [Content]
      summary: 获取博客详情（按 slug）
      parameters:
        - $ref: '#/components/parameters/ProductSlugParam'
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/LocaleQueryParam'
      responses:
        '200':
          description: 博客详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlogDetail'
        '404':
          description: 博客不存在或未发布
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/front/products/{slug}:
    get:
      tags: [Products]
      summary: 获取商品详情
      parameters:
        - $ref: '#/components/parameters/ProductSlugParam'
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/LocaleQueryParam'
      responses:
        '200':
          description: 商品详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
        '404':
          description: 商品不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/front/products/{slug}/related:
    get:
      tags: [Products]
      summary: 获取相关推荐商品
      parameters:
        - $ref: '#/components/parameters/ProductSlugParam'
      responses:
        '200':
          description: 相关推荐列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductCard'
  /api/front/cart:
    get:
      tags: [Cart]
      summary: 获取当前购物车
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/LocaleQueryParam'
      responses:
        '200':
          description: 购物车详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
    post:
      tags: [Cart]
      summary: 添加商品到购物车（需为每个可配置特性选定一个值）
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/LocaleQueryParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCartItemRequest'
      responses:
        '200':
          description: 更新后的购物车
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '400':
          description: 请求非法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/front/cart/items/{itemId}:
    patch:
      tags: [Cart]
      summary: 更新购物车商品数量
      parameters:
        - $ref: '#/components/parameters/CartItemIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCartItemRequest'
      responses:
        '200':
          description: 更新后的购物车
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
    delete:
      tags: [Cart]
      summary: 删除购物车商品
      parameters:
        - $ref: '#/components/parameters/CartItemIdParam'
      responses:
        '204':
          description: 删除成功
  /api/front/checkout/orders:
    post:
      tags: [Checkout]
      summary: 从当前购物车创建订单
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetail'
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/front/orders:
    get:
      tags: [Orders]
      summary: 获取当前用户订单列表
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 订单列表
          content:
            application/json:
    patch:
      tags: [Cart]
      summary: 应用或移除购物车优惠码
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCartCouponRequest'
      responses:
        '200':
          description: 更新后的购物车
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '400':
          description: 请求非法或优惠码不可用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
                type: array
                items:
                  $ref: '#/components/schemas/OrderSummary'
  /api/front/orders/{orderNumber}:
    get:
      tags: [Orders]
      summary: 获取订单详情
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderNumberParam'
      responses:
        '200':
          description: 订单详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetail'
        '404':
          description: 订单不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/front/addresses:
    get:
      tags: [Addresses]
      summary: 获取当前用户地址列表
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AddressTypeQueryParam'
      responses:
        '200':
          description: 地址列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Address'
    post:
      tags: [Addresses]
      summary: 新增地址
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/Address'
                - type: object
                  required: [addressType, firstName, lastName, countryCode, city, addressLine1, postalCode]
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
  /api/front/addresses/{id}:
    patch:
      tags: [Addresses]
      summary: 更新地址
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Address'
      responses:
        '200':
          description: 更新成功
    delete:
      tags: [Addresses]
      summary: 删除地址
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 删除成功
  /api/front/auth/register:
    post:
      tags: [Auth]
      summary: 用户注册（轻量或 B2B 完整注册）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRegisterRequest'
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
  /api/front/auth/login:
    post:
      tags: [Auth]
      summary: 用户登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          description: 登录失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/front/auth/change-password:
    post:
      tags: [Auth]
      summary: 登录后修改密码
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: 修改成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]
        '400':
          description: 当前密码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/front/auth/logout:
    post:
      tags: [Auth]
      summary: 用户退出登录
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 退出成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]
  /api/front/profile:
    get:
      tags: [Profile]
      summary: 获取当前用户基本资料
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 用户资料
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
    patch:
      tags: [Profile]
      summary: 更新当前用户基本资料
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                phone:
                  type:
                    - string
                    - 'null'
                jobTitle:
                  type:
                    - string
                    - 'null'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
  /api/front/profile/company:
    get:
      tags: [Profile]
      summary: 获取当前用户公司资料
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 公司资料
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyProfile'
    patch:
      tags: [Profile]
      summary: 更新当前用户公司资料
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyProfile'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyProfile'
  /api/front/languages:
    get:
      tags: [Languages]
      summary: 获取可用语言列表（含绑定币种）
      responses:
        '200':
          description: 语言列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  languages:
                    type: array
                    items:
                      $ref: '#/components/schemas/SiteLanguage'
                required: [languages]
  /api/front/inquiries:
    post:
      tags: [Inquiries]
      summary: 提交询价
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInquiryRequest'
      responses:
        '201':
          description: 询价提交成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Inquiry'
    get:
      tags: [Inquiries]
      summary: 获取当前用户询价记录
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 询价列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Inquiry'
  /api/front/inquiries/{inquiryId}:
    get:
      tags: [Inquiries]
      summary: 获取询价详情
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/InquiryIdParam'
      responses:
        '200':
          description: 询价详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Inquiry'
  /api/front/wishlist:
    get:
      tags: [Wishlist]
      summary: 获取收藏列表（favorites）
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/LocaleQueryParam'
      responses:
        '200':
          description: 收藏列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WishlistResponse'
    post:
      tags: [Wishlist]
      summary: 添加商品到收藏
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/LocaleQueryParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
                  format: uuid
              required: [productId]
      responses:
        '201':
          description: 添加成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WishlistResponse'
  /api/front/wishlist/{productId}:
    delete:
      tags: [Wishlist]
      summary: 从收藏中移除商品
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductIdParam'
      responses:
        '204':
          description: 删除成功
  /api/front/compare/items:
    get:
      tags: [Compare]
      summary: 获取登录用户对比列表（匿名用户请使用 localStorage）
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/LocaleQueryParam'
      responses:
        '200':
          description: 对比列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  locale:
                    type: string
                  items:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                required: [locale, items]
    post:
      tags: [Compare]
      summary: 添加商品到对比列表
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/LocaleQueryParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
                  format: uuid
              required: [productId]
      responses:
        '201':
          description: 添加成功
        '409':
          description: 对比列表已达上限（4 个）
  /api/front/compare/items/{productId}:
    delete:
      tags: [Compare]
      summary: 从对比列表移除商品
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductIdParam'
      responses:
        '204':
          description: 删除成功
  /api/front/compare:
    post:
      tags: [Compare]
      summary: 执行商品对比矩阵（2-4 个商品，无需先加入列表）
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/LocaleQueryParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productIds:
                  type: array
                  minItems: 2
                  maxItems: 4
                  items:
                    type: string
                    format: uuid
              required: [productIds]
      responses:
        '200':
          description: 对比结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompareResult'
