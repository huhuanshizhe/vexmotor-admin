        '204':
          description: 删除成功
  /api/front/compare/items:
    get:
      tags: [Compare]
      summary: 获取登录用户对比列表
      description: |
        登录用户的服务端对比列表（最多 4 个）。匿名用户请在浏览器 localStorage 维护列表；
        规格矩阵请调用 `POST /api/front/compare`。
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/LocaleQueryParam'
      responses:
        '200':
          description: 对比列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompareItemsResponse'
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Compare]
      summary: 添加商品到对比列表
      description: 商品已存在时仍返回 201 与当前完整列表（幂等）。列表已满时返回 409。
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/LocaleQueryParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
                  format: uuid
              required: [productId]
              additionalProperties: false
      responses:
        '201':
          description: 添加成功（或商品已在列表中）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompareItemsResponse'
        '400':
          description: 请求体校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 商品不存在或已下架
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 对比列表已达上限（4 个）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/front/compare/items/{productId}:
    delete:
      tags: [Compare]
      summary: 从对比列表移除商品
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductIdParam'
      responses:
        '204':
          description: 删除成功
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 列表中无此商品
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/front/compare:
    post:
      tags: [Compare]
      summary: 生成商品对比规格矩阵
      description: |
        传入 2–4 个商品 ID，返回价格、库存、品牌、分类及 product features 组成的对比矩阵。
        无需登录，也不要求商品已加入 compare/items 列表。
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/LocaleQueryParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productIds:
                  type: array
                  minItems: 2
                  maxItems: 4
                  items:
                    type: string
                    format: uuid
              required: [productIds]
              additionalProperties: false
      responses:
        '200':
          description: 对比结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompareResult'
        '400':
          description: 请求体校验失败，或商品数量不在 2–4 之间（INVALID_PRODUCT_COUNT）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 一个或多个商品不存在或已下架（NOT_FOUND）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
