  /api/front/languages:
    get:
      tags: [Languages]
      summary: 获取前台可用语言列表（含绑定币种）
      description: |
        返回所有 `status=active` 的站点语言，供前台语言切换器使用。
        每项包含 `currencyCode`，表示该语言下的默认展示币种；调用商品、购物车等接口时通过 `x-vex-locale` 传入 `code`，服务端按语言-币种映射返回对应价格。
      responses:
        '200':
          description: 语言列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorefrontLanguagesResponse'
              example:
                languages:
                  - code: en
                    name: English
                    nativeName: English
                    region: Global
                    direction: ltr
                    countryCodes: [US, GB]
                    currencyCode: USD
                    isDefault: true
                    sortOrder: 0
                  - code: de
                    name: German
                    nativeName: Deutsch
                    region: Europe
                    direction: ltr
                    countryCodes: [DE, AT, CH]
                    currencyCode: EUR
                    isDefault: false
                    sortOrder: 10
  /api/front/ui-strings:
    get:
      tags: [Languages]
      summary: 获取前台 UI 静态文案（按 locale / keys / groups）
      description: |
        返回站点壳层 UI 文案。`locale=en` 时全部来自 `ui_strings.default_text`（英文范本）；
        其他语言优先返回 `ui_string_translations`，缺失时 fallback 英文范本。
        物流方式名称等实体文案不在此接口范围内。
      parameters:
        - name: locale
          in: query
          required: true
          schema:
            type: string
            example: de
        - name: keys
          in: query
          required: false
          schema:
            type: string
          description: 逗号分隔的 key 列表
        - name: groups
          in: query
          required: false
          schema:
            type: string
          description: 逗号分隔的分组名，如 navigation,header,footer
      responses:
        '200':
          description: UI 文案映射
          content:
            application/json:
              schema:
                type: object
                required: [locale, strings]
                properties:
                  locale:
                    type: string
                  strings:
                    type: object
                    additionalProperties:
                      type: string
              example:
                locale: de
                strings:
                  navigation.home: Startseite
                  navigation.products: Produkte
  /api/front/inquiries:
    post:
      tags: [Inquiries]
      summary: 提交询价
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInquiryRequest'
