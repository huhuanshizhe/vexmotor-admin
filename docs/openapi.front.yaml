  /api/front/auth/oauth/{path}:
    get:
      tags: [Auth]
      summary: NextAuth OAuth 路由（signin/callback/session 等）
      description: |
        NextAuth `basePath` 为 `/api/front/auth/oauth`。
        常见路径包括 `signin/google`、`callback/google`、`session` 等，由 `{path}` 捕获。
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: NextAuth 子路径，如 signin/google
      responses:
        '302':
          description: OAuth 重定向
        '200':
          description: OAuth 会话或元数据
    post:
      tags: [Auth]
      summary: NextAuth OAuth POST 处理
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 处理成功
        '302':
          description: 重定向
