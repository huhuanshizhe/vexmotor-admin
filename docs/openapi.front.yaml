            application/json:
              schema:
                $ref: '#/components/schemas/Inquiry'
    get:
      tags: [Inquiries]
      summary: 获取当前用户询价记录
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 询价列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountInquiryListItem'
  /api/front/inquiries/{id}:
    get:
      tags: [Inquiries]
      summary: 获取询价详情（支持 uuid 或 QT-* quoteNumber）
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/InquiryIdParam'
      responses:
        '200':
          description: 询价详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountInquiryDetail'
  /api/front/inquiries/{id}/messages:
    post:
      tags: [Inquiries]
      summary: 客户发送询盘追问
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/InquiryIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  type: string
              required: [body]
      responses:
        '200':
          description: 更新后的询盘详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountInquiryDetail'
  /api/front/inquiries/{id}/messages/stream:
    get:
      tags: [Inquiries]
      summary: 询盘消息 SSE 流（实时推送新消息）
      description: |
        Server-Sent Events 端点。连接后发送 `ready` 事件，随后在有新消息时推送 `message` 事件。
        可选查询参数 `after` 为上一消息 id，用于断点续传。
        浏览器 EventSource 无法携带 Authorization 头时，可传 `access_token` 查询参数。
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/InquiryIdParam'
        - in: query
          name: after
          schema:
            type: string
            format: uuid
          description: 仅推送该消息之后的新消息
        - in: query
          name: access_token
          schema:
            type: string
          description: 前台 JWT（EventSource 备用鉴权）
      responses:
        '200':
          description: text/event-stream
          content:
            text/event-stream:
              schema:
                type: string
  /api/front/upload/inquiry:
    post:
      tags: [Inquiries]
      summary: 上传询盘附件
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: 上传成功
  /api/front/checkout/quote-preview:
