        '201':
          description: 添加成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WishlistResponse'
  /api/front/wishlist/{productId}:
    delete:
      tags: [Wishlist]
      summary: 从收藏中移除商品
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductIdParam'
      responses:
        '204':
          description: 删除成功
  /api/front/compare/items:
    get:
      tags: [Compare]
      summary: 获取登录用户对比列表（匿名用户请使用 localStorage）
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/LocaleQueryParam'
      responses:
        '200':
          description: 对比列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  locale:
                    type: string
                  items:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                required: [locale, items]
    post:
      tags: [Compare]
      summary: 添加商品到对比列表
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/LocaleQueryParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
                  format: uuid
              required: [productId]
      responses:
        '201':
          description: 添加成功
        '409':
          description: 对比列表已达上限（4 个）
  /api/front/compare/items/{productId}:
    delete:
      tags: [Compare]
      summary: 从对比列表移除商品
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductIdParam'
      responses:
        '204':
          description: 删除成功
  /api/front/compare:
    post:
      tags: [Compare]
      summary: 执行商品对比矩阵（2-4 个商品，无需先加入列表）
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/LocaleQueryParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productIds:
                  type: array
                  minItems: 2
                  maxItems: 4
                  items:
                    type: string
                    format: uuid
              required: [productIds]
      responses:
        '200':
          description: 对比结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompareResult'
