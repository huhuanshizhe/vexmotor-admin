      tags: [Profile]
      summary: 获取会员中心统计摘要
      description: 需 Bearer 登录态。返回当前用户的订单、地址、询盘、收藏数量，用于 account 首页仪表盘。
      security:
        - bearerAuth: []
      responses:
        '200':
